name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  DATABASE_URL: postgresql://collabe:collabe@localhost:5432/collabe_md
  CORS_ORIGIN: http://localhost:5173
  WS_PORT: "3002"

jobs:
  build-and-test:
    name: Build, test, and E2E demo
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: collabe
          POSTGRES_PASSWORD: collabe
          POSTGRES_DB: collabe_md
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U collabe -d collabe_md"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Push database schema
        run: pnpm db:push

      - name: Run unit and integration tests
        run: pnpm test

      - name: Install Playwright browser
        run: pnpm --filter @collabe-md/web exec playwright install chromium --with-deps

      - name: Run E2E collaboration demo
        run: pnpm --filter @collabe-md/web test:e2e

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload E2E traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 14

  docker-smoke:
    name: Docker build and smoke test
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: |
          docker compose build

      - name: Start stack
        run: |
          docker compose up -d
          sleep 10

      - name: Smoke test API
        run: curl -fsS http://localhost:3001/api/health

      - name: Smoke test web
        run: curl -fsS http://localhost:5173 | grep -q "Collabe MD"

      - name: Tear down
        if: always()
        run: docker compose down -v
